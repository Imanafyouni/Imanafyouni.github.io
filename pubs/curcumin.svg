<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" font-family="'Segoe UI',Helvetica,Arial,sans-serif">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="70" y="34" font-size="19" font-weight="700" fill="#14202e">In vitro cumulative release of curcumin</text>
  <text x="70" y="52" font-size="13" fill="#5b6b7b">Curcumin-loaded liposomal nanoparticles (CLLNs), dialysis method</text>

  <!-- gridlines + y labels -->
  <g stroke="#e6ebf0" stroke-width="1">
    <line x1="70" y1="330" x2="600" y2="330"/>
    <line x1="70" y1="276" x2="600" y2="276"/>
    <line x1="70" y1="222" x2="600" y2="222"/>
    <line x1="70" y1="168" x2="600" y2="168"/>
    <line x1="70" y1="114" x2="600" y2="114"/>
    <line x1="70" y1="60"  x2="600" y2="60"/>
  </g>
  <g font-size="12" fill="#5b6b7b" text-anchor="end">
    <text x="60" y="334">0</text>
    <text x="60" y="280">20</text>
    <text x="60" y="226">40</text>
    <text x="60" y="172">60</text>
    <text x="60" y="118">80</text>
    <text x="60" y="64">100</text>
  </g>
  <!-- axes -->
  <line x1="70" y1="60" x2="70" y2="330" stroke="#9aa7b4" stroke-width="1.5"/>
  <line x1="70" y1="330" x2="600" y2="330" stroke="#9aa7b4" stroke-width="1.5"/>
  <g font-size="12" fill="#5b6b7b" text-anchor="middle">
    <text x="70"  y="350">0</text>
    <text x="158" y="350">12</text>
    <text x="247" y="350">24</text>
    <text x="335" y="350">36</text>
    <text x="423" y="350">48</text>
    <text x="512" y="350">60</text>
    <text x="600" y="350">72</text>
  </g>
  <text x="335" y="378" font-size="13" fill="#14202e" text-anchor="middle" font-weight="600">Time (hours)</text>
  <text x="22" y="195" font-size="13" fill="#14202e" text-anchor="middle" font-weight="600" transform="rotate(-90 22 195)">Cumulative release (%)</text>

  <!-- release curve -->
  <polyline fill="none" stroke="#0e7c86" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"
    points="70,330 84.7,289.5 114.2,259.8 143.6,238.2 246.7,195 423.3,157.2 600,141"/>
  <g fill="#0e7c86">
    <circle cx="84.7"  cy="289.5" r="4.5"/>
    <circle cx="143.6" cy="238.2" r="4.5"/>
    <circle cx="246.7" cy="195"   r="4.5"/>
    <circle cx="423.3" cy="157.2" r="4.5"/>
    <circle cx="600"   cy="141"   r="4.5"/>
  </g>
  <!-- annotations -->
  <text x="250" y="185" font-size="12" fill="#0e7c86" font-weight="600">~50% at 24 h</text>
  <text x="512" y="132" font-size="12" fill="#0e7c86" font-weight="600" text-anchor="middle">~70% at 72 h</text>
  <text x="92"  y="284" font-size="12" fill="#0e7c86" font-weight="600">15% at 2 h</text>

  <!-- key parameters callout -->
  <g>
    <rect x="360" y="220" width="228" height="96" rx="8" fill="#f4f8f9" stroke="#d6e3e5"/>
    <text x="374" y="242" font-size="12.5" font-weight="700" fill="#0e7c86">Characterization</text>
    <text x="374" y="263" font-size="12" fill="#3a4a5a">Particle size (DLS): ~250 nm</text>
    <text x="374" y="282" font-size="12" fill="#3a4a5a">Zeta potential: -32 mV</text>
    <text x="374" y="301" font-size="12" fill="#3a4a5a">Encapsulation efficiency: 75%</text>
  </g>
</svg>
