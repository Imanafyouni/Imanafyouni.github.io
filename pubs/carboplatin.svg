<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" font-family="'Segoe UI',Helvetica,Arial,sans-serif">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="70" y="34" font-size="19" font-weight="700" fill="#14202e">Cumulative carboplatin release</text>
  <text x="70" y="52" font-size="13" fill="#5b6b7b">Nanoliposomal formulation vs free drug (data: Table 1)</text>

  <!-- gridlines + y labels -->
  <g stroke="#e6ebf0" stroke-width="1">
    <line x1="70" y1="330" x2="600" y2="330"/>
    <line x1="70" y1="276" x2="600" y2="276"/>
    <line x1="70" y1="222" x2="600" y2="222"/>
    <line x1="70" y1="168" x2="600" y2="168"/>
    <line x1="70" y1="114" x2="600" y2="114"/>
    <line x1="70" y1="60"  x2="600" y2="60"/>
  </g>
  <g font-size="12" fill="#5b6b7b" text-anchor="end">
    <text x="60" y="334">0</text>
    <text x="60" y="280">20</text>
    <text x="60" y="226">40</text>
    <text x="60" y="172">60</text>
    <text x="60" y="118">80</text>
    <text x="60" y="64">100</text>
  </g>
  <line x1="70" y1="60" x2="70" y2="330" stroke="#9aa7b4" stroke-width="1.5"/>
  <line x1="70" y1="330" x2="600" y2="330" stroke="#9aa7b4" stroke-width="1.5"/>
  <g font-size="12" fill="#5b6b7b" text-anchor="middle">
    <text x="70"  y="350">0</text>
    <text x="158" y="350">12</text>
    <text x="247" y="350">24</text>
    <text x="335" y="350">36</text>
    <text x="423" y="350">48</text>
    <text x="512" y="350">60</text>
    <text x="600" y="350">72</text>
  </g>
  <text x="335" y="378" font-size="13" fill="#14202e" text-anchor="middle" font-weight="600">Time (hours)</text>
  <text x="22" y="195" font-size="13" fill="#14202e" text-anchor="middle" font-weight="600" transform="rotate(-90 22 195)">Cumulative release (%)</text>

  <!-- free drug (burst) -->
  <polyline fill="none" stroke="#e08e0b" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"
    points="77.4,278.7 92.1,254.4 121.5,230.1 143.6,200.4 224.6,130.2 290.8,70.8"/>
  <g fill="#e08e0b">
    <circle cx="77.4"  cy="278.7" r="4"/>
    <circle cx="143.6" cy="200.4" r="4"/>
    <circle cx="224.6" cy="130.2" r="4"/>
    <circle cx="290.8" cy="70.8"  r="4"/>
  </g>

  <!-- nanodrug (sustained) -->
  <polyline fill="none" stroke="#0e7c86" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"
    points="77.4,315.2 92.1,309.8 121.5,307.1 143.6,300.3 224.6,286.8 290.8,277.6 401.3,263.3 526.4,240.9 585.3,230.1"/>
  <g fill="#0e7c86">
    <circle cx="77.4"  cy="315.2" r="4"/>
    <circle cx="143.6" cy="300.3" r="4"/>
    <circle cx="290.8" cy="277.6" r="4"/>
    <circle cx="401.3" cy="263.3" r="4"/>
    <circle cx="585.3" cy="230.1" r="4"/>
  </g>

  <!-- annotations -->
  <text x="300" y="66"  font-size="12" fill="#e08e0b" font-weight="600">Free drug: 96% by 30 h (burst)</text>
  <text x="470" y="252" font-size="12" fill="#0e7c86" font-weight="600">Nanodrug: sustained, 37% at 70 h</text>

  <!-- legend -->
  <g font-size="12.5">
    <rect x="410" y="300" width="180" height="46" rx="8" fill="#fafbfc" stroke="#e0e6ec"/>
    <line x1="424" y1="315" x2="450" y2="315" stroke="#0e7c86" stroke-width="3"/>
    <text x="458" y="319" fill="#3a4a5a">Nanoliposomal carboplatin</text>
    <line x1="424" y1="334" x2="450" y2="334" stroke="#e08e0b" stroke-width="3"/>
    <text x="458" y="338" fill="#3a4a5a">Free carboplatin</text>
  </g>
</svg>
